# Framework registry —— stage 9 oracle 可识别的框架集合
#
# 作用：作为 stage 9 判别 `reference_oracle.framework` 是否是"已知框架"的参考。
#       未知框架 ⇒ stage 9 emit `unknown_framework` WARN（仍会尝试真 import）。
#
# 使用方法：新增框架只需在本文件 frameworks: 下加一项。代码侧不需修改。
schema_version: 1

frameworks:
  - torch        # PyTorch
  - numpy        # NumPy
  - scipy        # SciPy
  - tensorflow   # TensorFlow
  - jax          # JAX