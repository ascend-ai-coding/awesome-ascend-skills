# ============================================================
# reduce_sum_fixed — L0 数学约束 spec
# 教学点：Reduction 范式 + axis_source: fixed（归约轴固定不可配置）
#         无 dim attribute；reduction.fixed_value 声明固定归约轴
#         shape_rule 用 np.reduce_shape 表达（axis 为字面量）
# ============================================================
schema_version: 1

op:
  name: reduce_sum_fixed
  version: "1.0"
  description: "Sum reduction along the last axis (fixed); axis is not configurable"
  category: Reduction
  paradigms: [Reduction]
  lifecycle: stable
  error_codes:
    - null_input
    - shape_mismatch
    - attribute_value_out_of_range
  platform_constraints:
    supported_chips: [Ascend910B]
    requires_hccl: false

inputs:
  - name: x
    role: tensor
    dtype_set: [float16, float32, bfloat16]
    rank_range: [1, 8]
    layout: ND
    shape:
      symbolic: ["...x", "R"]

attributes:
  - name: keep_dims
    type: bool
    default: false
    semantics: "是否保留归约轴；保留时归约轴长度为 1"
    machine_constraint: {kind: bool}

outputs:
  - name: y
    shape_rule_kind: numpy_expr
    shape_rule: |
      y.shape = np.reduce_shape(x.shape, axis=-1, keepdims=keep_dims)
    dtype_rule_kind: numpy_expr
    dtype_rule: |
      y.dtype = x.dtype
    layout: ND
    aliasing: none

reduction:
  axis_source: fixed
  fixed_value: -1

shape_constraints:
  symbols: {R: {kind: dim, range: [0, 9223372036854775807]}}
  global_constraints:
    - "rank(x) <= 8"

dtype_policy:
  promotion: same_as_first_input
  supported_combinations:
    - {inputs: {x: float16},  outputs: {y: float16}}
    - {inputs: {x: float32},  outputs: {y: float32}}
    - {inputs: {x: bfloat16}, outputs: {y: bfloat16}}

broadcast:
  kind: none

math_semantics:
  formula_kind: numpy_expr
  formula: |
    y = np.sum(x, axis=-1, keepdims=keep_dims)

  reference_oracle:
    framework: torch
    api: torch.sum
    kwargs: {dim: -1}
    available_for_dtype: [float16, float32, bfloat16]
    absent: false

  invariants:
    - name: zero_input_zero_output
      kind: equals_when_input_is_zero
      value: 0.0

numerical_stability:
  required: false
  techniques: []
  affects_invariants: false

numerical_tolerance:
  source: "ops-precision-standard/float_compute.md"
  per_dtype:
    float32:  {rtol: 1.0e-5, atol: 1.0e-5, metric: max_relative}
    float16:  {rtol: 1.0e-3, atol: 1.0e-3, metric: max_relative}
    bfloat16: {rtol: 4.0e-3, atol: 4.0e-3, metric: max_relative}

boundary_conditions:
  - case: "reduce 轴长度为 1"
    tags: [reduce_axis_size_1]
    synthesize: {x.shape: "[1]", attr.keep_dims: false}
    machine_check: {kind: matches_oracle}
  - case: "rank=0 标量输入 → 归约轴越界"
    tags: [rank_zero_scalar]
    synthesize: {x.shape: "[]", attr.keep_dims: false}
    machine_check: {kind: raises_error, error_type: attribute_value_out_of_range}
  - case: "空 Tensor"
    tags: [empty_tensor]
    synthesize: {x.shape: "[0, 4]"}
    machine_check: {kind: returns_empty}
  - case: "keep_dims=true 保留归约轴"
    synthesize: {x.shape: "[2, 3]", attr.keep_dims: true}
    machine_check: {kind: matches_oracle}

extreme_inputs:
  - case: "含 NaN"
    synthesize:
      shapes: {x: "[8]"}
      patterns:
        - {pattern: inject_nan_one_element, target: x}
    machine_check: {kind: produces_nan, scope: "整张量"}

  - case: "全零输入"
    synthesize:
      shapes: {x: "[8]"}
      patterns:
        - {pattern: all_zero, target: x}
    machine_check: {kind: equals, value: 0.0}

determinism:
  required: true
  accumulation_order: stable_in_axis
  partition_constraint: "禁止跨核 reduce 同一归约轴"
  bitwise_reproducible: true
