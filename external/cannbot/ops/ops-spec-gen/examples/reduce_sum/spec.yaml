# ============================================================
# reduce_sum — L0 数学约束 spec
# 教学点：Reduction 范式 + axis 作为 tensor input（运行时值决定归约轴）
#         output shape_rule_kind: data_dependent（axis 值运行时决定输出 shape）
#         axis 输入 dtype∈{int32,int64}；validator 自动识别为归约轴输入
# ============================================================
schema_version: 1

op:
  name: reduce_sum
  version: "1.0"
  description: "Sum reduction along a runtime-specified axis (axis as tensor input)"
  category: Reduction
  paradigms: [Reduction]
  lifecycle: stable
  error_codes:
    - null_input
    - shape_mismatch
  platform_constraints:
    supported_chips: [Ascend910B]
    requires_hccl: false

inputs:
  - name: x
    role: tensor
    dtype_set: [float16, float32, bfloat16]
    rank_range: [1, 8]
    layout: ND
    shape:
      symbolic: ["...x", "R"]
  - name: axis
    role: tensor
    dtype_set: [int32]
    rank_range: [0, 0]
    layout: ND
    shape:
      symbolic: []

attributes:
  - name: keep_dims
    type: bool
    default: false
    semantics: "是否保留归约轴；保留时归约轴长度为 1"
    machine_constraint: {kind: bool}

outputs:
  - name: y
    shape_rule_kind: data_dependent
    data_dependent_shape: true
    shape_rule_description: |
      keep_dims=true:  y.shape = x.shape 归约轴置 1
      keep_dims=false: y.shape = x.shape 去除归约轴
      axis 值运行时决定，无法静态推导
    shape_bounds:
      max_elements: "prod(x.shape)"
      output_rank: 8
    dtype_rule_kind: numpy_expr
    dtype_rule: |
      y.dtype = x.dtype
    layout: ND
    aliasing: none

shape_constraints:
  symbols: {R: {kind: dim, range: [0, 9223372036854775807]}}
  global_constraints:
    - "rank(x) <= 8"

dtype_policy:
  promotion: same_as_first_input
  supported_combinations:
    - {inputs: {x: float16, axis: int32},  outputs: {y: float16}}
    - {inputs: {x: float32, axis: int32},  outputs: {y: float32}}
    - {inputs: {x: bfloat16, axis: int32}, outputs: {y: bfloat16}}

broadcast:
  kind: none

math_semantics:
  formula_kind: numpy_expr
  formula: |
    y = np.sum(x, axis=0, keepdims=keep_dims)

  reference_oracle:
    framework: torch
    api: torch.sum
    kwargs: {dim: "${input.axis}"}
    available_for_dtype: [float16, float32, bfloat16]
    absent: false

  invariants:
    - name: zero_input_zero_output
      kind: equals_when_input_is_zero
      value: 0.0

numerical_stability:
  required: false
  techniques: []
  affects_invariants: false

numerical_tolerance:
  source: "ops-precision-standard/float_compute.md"
  per_dtype:
    float32:  {rtol: 1.0e-5, atol: 1.0e-5, metric: max_relative}
    float16:  {rtol: 1.0e-3, atol: 1.0e-3, metric: max_relative}
    bfloat16: {rtol: 4.0e-3, atol: 4.0e-3, metric: max_relative}

boundary_conditions:
  - case: "reduce 轴长度为 1"
    tags: [reduce_axis_size_1]
    synthesize: {x.shape: "[1]", attr.keep_dims: false}
    machine_check: {kind: matches_oracle}
  - case: "rank=0 标量输入"
    tags: [rank_zero_scalar]
    synthesize: {x.shape: "[]"}
    machine_check: {kind: matches_oracle}
  - case: "空 Tensor"
    tags: [empty_tensor]
    synthesize: {x.shape: "[0, 4]"}
    machine_check: {kind: returns_empty}
  - case: "axis=0 归约第一轴"
    synthesize: {x.shape: "[2, 3]", attr.keep_dims: false}
    machine_check: {kind: matches_oracle}

extreme_inputs:
  - case: "含 NaN"
    synthesize:
      shapes: {x: "[8]"}
      patterns:
        - {pattern: inject_nan_one_element, target: x}
    machine_check: {kind: produces_nan, scope: "整张量"}

  - case: "全零输入"
    synthesize:
      shapes: {x: "[8]"}
      patterns:
        - {pattern: all_zero, target: x}
    machine_check: {kind: equals, value: 0.0}

determinism:
  required: true
  accumulation_order: stable_in_axis
  partition_constraint: "禁止跨核 reduce 同一归约轴"
  bitwise_reproducible: true
